suffix_rules:
  - name: subtitle_cn
    type: alias
    aliases: ["中字", "中文字幕", "SUB"]
    canonical: C

  - name: multi_cd
    type: regexp
    pattern: '(?i)\bCD\s*([0-9]+)\b'
    canonical_template: 'CD$1'

  - name: quality_4k
    type: alias
    aliases: ["4K", "UHD"]
    canonical: 4K

  - name: vr
    type: alias
    aliases: ["VR"]
    canonical: VR
