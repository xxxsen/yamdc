# 执行顺序:
# 1. normalizers
# 2. rewrite_rules
# 3. suffix_rules
# 4. noise_rules
# 5. matchers
# 6. post_processors
# 7. number.Parse 校验
#
# 说明:
# - normalizers: 做 basename/去扩展名/全角转半角/大小写统一等基础清洗
# - rewrite_rules: 做定向正则改写，例如 FC2 规整、1PON/CARIB 前缀剥离
# - suffix_rules: 提取字幕/CD/4K/VR/LEAK 等后缀，并暂存到结果中
# - noise_rules: 去掉域名、站点标签、编码标签等噪声
# - matchers: 匹配主番号，并给出 category / uncensor 等派生属性
# - post_processors: 将主番号与后缀重新拼回最终规范结果

version: v1

options:
  case_mode: upper
  collapse_spaces: true
  enable_embedded_match: true
  fail_when_no_match: false

normalizers:
  - name: basename
    type: builtin
    builtin: basename
  - name: strip_ext
    type: builtin
    builtin: strip_ext
  - name: fullwidth_to_halfwidth
    type: builtin
    builtin: fullwidth_to_halfwidth
  - name: replace_brackets
    type: replace
    pairs:
      "【": "["
      "】": "]"
      "（": "("
      "）": ")"
      "@": " "
      "#": " "
      "|": " "
  - name: trim_space
    type: builtin
    builtin: trim_space
  - name: collapse_spaces
    type: builtin
    builtin: collapse_spaces
  - name: to_upper
    type: builtin
    builtin: to_upper

rewrite_rules:
  - name: rewrite_fc2_ppv
    pattern: '(?i)^FC2[-_\s]?(?:PPV)?[-_\s]?([0-9]{3,})([-_].*)?$'
    replace: 'FC2-PPV-$1$2'
  - name: strip_uncensored_vendor_prefix
    pattern: '(?i)^(?:1PONDO|1PON|CARIB)[-_]?([0-9]{4,6}[-_][0-9]{2,3}(?:[-_ ].*)?)$'
    replace: '$1'

suffix_rules:
  - name: chinese_subtitle_word
    type: regex
    pattern: '(?i)(?:^|[\s\[\]\(\)_-])(?:中字|中文字幕|SUBTITLE|SUB)(?:$|[\s\[\]\(\)_-])'
    canonical: "C"
    priority: 100
  - name: chinese_subtitle_suffix
    type: regex
    pattern: '(?i)(?:^|[\s\[\]\(\)_-])C(?:$|[\s\[\]\(\)_-])'
    canonical: "C"
    priority: 95
  - name: cd_index
    type: regex
    pattern: '(?i)(?:^|[\s\[\]\(\)_-])CD([0-9]+)(?:$|[\s\[\]\(\)_-])'
    canonical_template: 'CD$1'
    priority: 10
  - name: suffix_4k
    type: regex
    pattern: '(?i)(?:^|[\s\[\]\(\)_-])(?:4K|2160P)(?:$|[\s\[\]\(\)_-])'
    canonical: "4K"
    priority: 80
  - name: suffix_8k
    type: regex
    pattern: '(?i)(?:^|[\s\[\]\(\)_-])8K(?:$|[\s\[\]\(\)_-])'
    canonical: "8K"
    priority: 70
  - name: suffix_vr
    type: regex
    pattern: '(?i)(?:^|[\s\[\]\(\)_-])VR(?:$|[\s\[\]\(\)_-])'
    canonical: "VR"
    priority: 60
  - name: suffix_leak
    type: regex
    pattern: '(?i)(?:^|[\s\[\]\(\)_-])LEAK(?:$|[\s\[\]\(\)_-])'
    canonical: "LEAK"
    priority: 50
  - name: suffix_hack
    type: regex
    pattern: '(?i)(?:^|[\s\[\]\(\)_-])(?:UC|U)(?:$|[\s\[\]\(\)_-])'
    canonical: "UC"
    priority: 40

noise_rules:
  - name: domain_tags
    type: regex
    pattern: '(?i)\b(?:[A-Z0-9-]+\.)+[A-Z0-9-]+\b'
  - name: source_tags
    type: token
    aliases: ["JAV", "JAVDB", "JAVBUS", "MISSAV", "THZ.LA", "HHD800"]
  - name: codec_tags
    type: token
    aliases: ["1080P", "720P", "2160P", "H264", "H265", "X264", "X265", "HEVC"]
  - name: wrappers
    type: regex
    pattern: '(?i)\[(?:JAV|JAVDB|MISSAV|THZ\.LA|HHD800)\]'

matchers:
  - name: fc2
    category: FC2
    uncensor: true
    pattern: '(?i)FC2[-_\s]?(?:PPV)?[-_\s]?([0-9]{3,})'
    normalize_template: 'FC2-PPV-$1'
    score: 100
  - name: heyzo
    uncensor: true
    pattern: '(?i)HEYZO[-_\s]?([0-9]{3,6})'
    normalize_template: 'HEYZO-$1'
    score: 95
  - name: manyvids
    category: MANYVIDS
    uncensor: true
    pattern: '(?i)MANYVIDS[-_\s]?([0-9]{3,})'
    normalize_template: 'MANYVIDS-$1'
    score: 92
  - name: caribpr
    uncensor: true
    pattern: '(?i)CARIB(?:BEANCOMPR)?[-_\s]?([0-9]{6})[-_]([0-9]{2,3})'
    normalize_template: '$1-$2'
    score: 90
  - name: onepondo
    uncensor: true
    pattern: '(?i)(?:1PONDO|1PON)[-_\s]?([0-9]{6})[_-]([0-9]{2,3})'
    normalize_template: '${1}_${2}'
    score: 90
  - name: carib_prefix
    uncensor: true
    pattern: '(?i)\b(CARIB[A-Z0-9_-]{3,})\b'
    normalize_template: '$1'
    score: 89
  - name: onepon_prefix
    uncensor: true
    pattern: '(?i)\b(1PON(?:DO)?[-_A-Z0-9]{3,})\b'
    normalize_template: '$1'
    score: 89
  - name: uncensored_date_underscore
    uncensor: true
    pattern: '(?i)\b([0-9]{4,6})_([0-9]{2,3})\b'
    normalize_template: '${1}_${2}'
    score: 88
  - name: uncensored_date_hyphen
    uncensor: true
    pattern: '(?i)\b([0-9]{4,6})-([0-9]{2,3})\b'
    normalize_template: '$1-$2'
    score: 88
  - name: jvr
    category: JVR
    uncensor: true
    pattern: '(?i)\bJVR[-_\s]?([0-9]{2,6})\b'
    normalize_template: 'JVR-$1'
    score: 85
  - name: madou
    category: MD
    uncensor: true
    pattern: '(?i)\bMADOU[-_\s]?([A-Z0-9-]{2,})\b'
    normalize_template: 'MADOU-$1'
    score: 84
  - name: cospuri
    category: COSPURI
    uncensor: true
    pattern: '(?i)\bCOSPURI[-_\s]?([A-Z0-9-]{4,})\b'
    normalize_template: 'COSPURI-$1'
    score: 84
  - name: uncensor_misc_prefix
    uncensor: true
    pattern: '(?i)\b((?:SM3D2DBD|SMDV|SKY|HEY|MKD|MKBD|H4610|H0930|MXX|DSAM)[-_A-Z0-9]{2,})\b'
    normalize_template: '$1'
    score: 83
  - name: uncensor_sep_prefix
    uncensor: true
    pattern: '(?i)\b((?:SMD|SSDV|CCDV|LLDV|DRC)[-_][A-Z0-9-]{2,})\b'
    normalize_template: '$1'
    score: 83
  - name: uncensor_n_code
    uncensor: true
    pattern: '(?i)\b(N[0-9]{2,6})\b'
    normalize_template: '$1'
    score: 82
  - name: uncensor_k_code
    uncensor: true
    pattern: '(?i)\b(KB?[0-9]{2,6})\b'
    normalize_template: '$1'
    score: 82
  - name: uncensor_c_ki_code
    uncensor: true
    pattern: '(?i)\b(C[0-9]{1,6}[-_]KI[0-9]{1,6})\b'
    normalize_template: '$1'
    score: 82
  - name: generic_censored
    pattern: '(?i)\b([A-Z]{2,10})[-_\s]?([0-9]{2,6})\b'
    normalize_template: '$1-$2'
    score: 80

post_processors:
  - name: reorder_suffix
    type: builtin
    builtin: reorder_suffix
  - name: normalize_hyphen
    type: builtin
    builtin: normalize_hyphen
