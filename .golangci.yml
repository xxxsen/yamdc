version: "2"

run:
  timeout: 5m
  tests: true
  go: "1.24"

linters:
  default: none

  enable:
    # correctness / bug finding
    - bodyclose
    - contextcheck
    - copyloopvar
    - err113
    - errcheck
    - errorlint
    - gocritic
    - gosec
    - govet
    - ineffassign
    - nilerr
    - nilnil
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unparam
    - unused

    # maintainability / readability
    - dupl
    - exhaustive
    - funlen
    - gocognit
    - gocyclo
    - interfacebloat
    - lll
    - misspell
    - nakedret
    - nestif
    - nolintlint
    - nonamedreturns
    - prealloc
    - revive
    - unconvert
    - whitespace
    - dogsled
    - makezero

    # engineering discipline
    - forbidigo
    - wrapcheck

  exclusions:
    generated: strict
    presets:
      - comments
      - common-false-positives
      - legacy

    rules:
      # 测试代码适度放宽，否则噪音会很大
      - path: '(.+)_test\.go'
        linters:
          - dupl
          - err113
          - funlen
          - gocognit
          - gocyclo
          - lll
          - nestif
          - wrapcheck

      # mocks / vendor / testdata 一般不做严格质量约束
      - path: '(^|/)(mock|mocks|testdata|vendor)/'
        linters:
          - dupl
          - gosec
          - lll
          - revive

      # main 入口通常允许更偏应用层写法
      - path: '(^|/)cmd/.+/main\.go'
        linters:
          - forbidigo
          - wrapcheck

settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln
      - io.Copy
      - io.CopyBuffer
      - io.CopyN

  govet:
    enable:
      - shadow

  copyloopvar:
    check-alias: true

  dupl:
    threshold: 120

  funlen:
    lines: 80
    statements: 50

  gocognit:
    min-complexity: 20

  gocyclo:
    min-complexity: 12

  interfacebloat:
    max: 5

  lll:
    line-length: 120
    tab-width: 2

  misspell:
    locale: US

  nestif:
    min-complexity: 4

  nolintlint:
    require-explanation: true
    require-specific: true
    allow-unused: false

  nonamedreturns:
    report-error-in-defer: true

  prealloc:
    simple: true
    range-loops: true
    for-loops: false

  makezero:
    always: true

  errorlint:
    errorf: true
    errorf-multi: true
    asserts: true
    comparison: true

  wrapcheck:
    ignore-sigs:
      - .Errorf(
      - errors.New(
      - errors.Unwrap(
      - errors.Join(
    ignore-package-globs:
      - encoding/*
      - github.com/pkg/errors

  forbidigo:
    forbid:
      - pattern: '^fmt\.Print.*$'
        msg: "不要提交调试输出，改用结构化日志"
      - pattern: '^print(ln)?$'
        msg: "不要使用内建 print/println"

  revive:
    enable-all-rules: false
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: early-return
      - name: empty-block
      - name: empty-lines
      - name: error-naming
      - name: error-return
      - name: exported
        arguments:
          - disableStutteringCheck
      - name: if-return
      - name: increment-decrement
      - name: indent-error-flow
      - name: modifies-parameter
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: redefines-builtin-id
      - name: redundant-import-alias
      - name: string-of-int
      - name: superfluous-else
      - name: time-equal
      - name: time-naming
      - name: unchecked-type-assertion
      - name: unnecessary-if
      - name: unnecessary-stmt
      - name: unreachable-code
      - name: unused-parameter
        arguments:
          - allow-regex: "^_"
      - name: unused-receiver
        arguments:
          - allow-regex: "^_"
      - name: use-any
      - name: use-errors-new
      - name: use-waitgroup-go

formatters:
  enable:
    - gofumpt
    - goimports

  settings:
    gofumpt:
      extra-rules: true
      module-path: github.com/yourorg/yourrepo

    goimports:
      local-prefixes:
        - github.com/yourorg/yourrepo

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true

severity:
  default: error
