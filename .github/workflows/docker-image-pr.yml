name: build_pr_image

on:
  workflow_run:
    workflows:
      - pr_check
    types:
      - completed
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to build
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request') }}
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event.workflow_run.pull_requests[0].number }}
      CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/pull/{0}/merge', inputs.pr_number) || format('refs/pull/{0}/merge', github.event.workflow_run.pull_requests[0].number) }}
    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        uses: docker/build-push-action@v2
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: xxxsen/yamdc:pr-${{ env.PR_NUMBER }}

  build-yamdc-web:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request') }}
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event.workflow_run.pull_requests[0].number }}
      CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/pull/{0}/merge', inputs.pr_number) || format('refs/pull/{0}/merge', github.event.workflow_run.pull_requests[0].number) }}
    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build yamdc-web image
        uses: docker/build-push-action@v2
        with:
          context: ./web
          platforms: linux/amd64
          push: true
          file: web/Dockerfile
          tags: xxxsen/yamdc-web:pr-${{ env.PR_NUMBER }}
