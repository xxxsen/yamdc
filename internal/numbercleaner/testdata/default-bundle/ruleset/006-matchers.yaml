version: v1
matchers:
  - name: rawx_uncensor
    pattern: '(?i)\b(RAWX-PPV-[0-9]{3,})\b'
    normalize_template: '$1'
    score: 100
    category: RAWX
    uncensor: true
  - name: open_uncensor
    pattern: '(?i)\b(OPEN)[-_\s]?([0-9]{3,5})\b'
    normalize_template: '$1-$2'
    score: 95
    uncensor: true
  - name: generic_censored
    pattern: '(?i)\b([A-Z]{2,10})[-_\s]?([0-9]{2,6})\b'
    normalize_template: '$1-$2'
    score: 80
    require_boundary: true
