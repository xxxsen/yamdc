version: v1
suffix_rules:
  - name: subtitle_flag
    type: token
    aliases: ["SUB"]
    canonical: C
    priority: 10
  - name: disc_number
    type: regex
    pattern: '(?i)\bDISC\s*([0-9]+)\b'
    canonical_template: 'CD$1'
    priority: 20
  - name: special_edition_flag
    type: token
    aliases: ["LEAK"]
    canonical: LEAK
    priority: 30
