version: 1
name: javlibrary
type: one-step
hosts:
  - https://www.javlibrary.com
request:
  method: GET
  path: /cn/vl_searchbyid.php
  query:
    keyword: ${number}
  accept_status_codes: [200]
scrape:
  format: html
  fields:
    number:
      selector:
        kind: xpath
        expr: //tbody/tr[td[contains(text(), "识别码:")]]/td[@class="text"]/text()
      parser: string
      required: true
    title:
      selector:
        kind: xpath
        expr: //div[@id="video_title"]/h3[@class="post-title text"]/a[@rel="bookmark"]/text()
      parser: string
      required: true
    actors:
      selector:
        kind: xpath
        expr: //tbody/tr[td[contains(text(), "演员:")]]/td[@class="text"]//span[@class="star"]/a/text()
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    release_date:
      selector:
        kind: xpath
        expr: //tbody/tr[td[contains(text(), "发行日期:")]]/td[@class="text"]/text()
      parser: date_only
    duration:
      selector:
        kind: xpath
        expr: //tbody/tr[td[contains(text(), "长度:")]]/td/span[@class="text"]/text()
      parser: duration_mm
    studio:
      selector:
        kind: xpath
        expr: //tbody/tr[td[contains(text(), "制作商:")]]/td[@class="text"]//span[@class="maker"]/a/text()
      parser: string
    label:
      selector:
        kind: xpath
        expr: //tbody/tr[td[contains(text(), "发行商:")]]/td[@class="text"]//span[@class="label"]/a/text()
      parser: string
    director:
      selector:
        kind: xpath
        expr: //tbody/tr[td[contains(text(), "导演:")]]/td[@class="text"]/text()
      transforms:
        - kind: replace
          old: "----"
          new: ""
      parser: string
    genres:
      selector:
        kind: xpath
        expr: //tbody/tr[td[contains(text(), "类别:")]]/td[@class="text"]/span[@class="genre"]/a/text()
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    cover:
      selector:
        kind: xpath
        expr: //img[@id="video_jacket_img"]/@src
      parser: string
      required: true
    sample_images:
      selector:
        kind: xpath
        expr: //div[@class="previewthumbs"]/a/@href
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
postprocess:
  defaults:
    title_lang: ja
