version: 1
name: avsox
type: two-step
hosts:
  - https://avsox.click
multi_request:
  unique: true
  candidates:
    - ${to_upper(${number})}
    - ${replace(${to_upper(${number})}, "-", "_")}
    - ${replace(${replace(${to_upper(${number})}, "-", "_")}, "_", "")}
  request:
    method: GET
    path: /cn/search/${candidate}
    accept_status_codes: [200]
  success_when:
    mode: and
    conditions:
      - selector_exists(xpath("//*[@id='waterfall']/div/a"))
workflow:
  search_select:
    selectors:
      - name: read_link
        kind: xpath
        expr: //*[@id="waterfall"]/div/a/@href
    match:
      mode: and
      conditions:
        - contains("${item.read_link}", "movie")
      expect_count: 1
    return: ${item.read_link}
    next_request:
      method: GET
      url: ${build_url("https:", ${value})}
      accept_status_codes: [200]
scrape:
  format: html
  fields:
    number:
      selector:
        kind: xpath
        expr: //span[contains(text(),"识别码:")]/../span[2]/text()
      parser: string
      required: true
    title:
      selector:
        kind: xpath
        expr: /html/body/div[2]/h3/text()
      parser: string
      required: true
    actors:
      selector:
        kind: xpath
        expr: //a[@class="avatar-box"]/span/text()
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    release_date:
      selector:
        kind: xpath
        expr: '//span[contains(text(),"发行时间:")]/../text()'
      parser: date_only
    duration:
      selector:
        kind: xpath
        expr: //p[span[contains(text(), "长度")]]/text()
      parser: duration_default
    studio:
      selector:
        kind: xpath
        expr: '//p[contains(text(),"制作商: ")]/following-sibling::p[1]/a/text()'
      parser: string
    series:
      selector:
        kind: xpath
        expr: '//p[contains(text(),"系列:")]/following-sibling::p[1]/a/text()'
      parser: string
    genres:
      selector:
        kind: xpath
        expr: //p[span[@class="genre"]]/span/a[contains(@href, "genre")]
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    cover:
      selector:
        kind: xpath
        expr: /html/body/div[2]/div[1]/div[1]/a/img/@src
      parser: string
      required: true
postprocess:
  defaults:
    title_lang: ja
