version: 1
name: 18av
type: two-step
hosts:
  - https://18av.me
request:
  method: GET
  path: /cn/search.php
  query:
    kw_type: key
    kw: ${number}
  accept_status_codes: [200]
workflow:
  search_select:
    selectors:
      - name: read_link
        kind: xpath
        expr: //div[@class="content flex-columns small px-2"]/span[@class="title"]/a/@href
      - name: read_title
        kind: xpath
        expr: //div[@class="content flex-columns small px-2"]/span[@class="title"]/a/text()
    match:
      mode: and
      conditions:
        - contains("${to_upper(${item.read_title})}", "${to_upper(${number})}")
    return: ${item.read_link}
    next_request:
      method: GET
      url: ${concat(${host}, "/cn", ${value})}
      accept_status_codes: [200]
scrape:
  format: html
  fields:
    number:
      selector:
        kind: xpath
        expr: //div[@class="px-0 flex-columns"]/div[@class="number"]/text()
      parser: string
      required: true
    title:
      selector:
        kind: xpath
        expr: //div[@class="d-flex px-3 py-2 name col bg-w"]/h1[@class="h4 b"]/text()
      parser: string
      required: true
    plot:
      selector:
        kind: xpath
        expr: //div[@class="intro  bd-light w-100 mt-1"]/p[contains(text(), '简介：')]/text()
      transforms:
        - kind: trim_prefix
          value: 简介：
        - kind: trim
      parser: string
    actors:
      selector:
        kind: xpath
        expr: //div[@class="d-flex col px-0 tag-info flex-wrap mt-2 pt-2 bd-top bd-primary"]/a/span[@itemprop="name"]/text()
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    release_date:
      selector:
        kind: xpath
        expr: //div[@class="date"]/text()
      parser: date_only
    series:
      selector:
        kind: xpath
        expr: //div[@class="bd-top my-1 align-items-center"]/a[@class="btn btn-ripple border-pill px-3 mr-2 my-1 bg-primary"]
      parser: string
    genres:
      selector:
        kind: xpath
        expr: //div[@class="d-flex col px-0 tag-info flex-wrap mt-2 pt-2 bd-top bd-primary"]/a[contains(@href, "s_type=tag")]/text()
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    cover:
      selector:
        kind: xpath
        expr: //meta[@property="og:image"]/@content
      transforms:
        - kind: replace
          old: " "
          new: ""
      parser: string
      required: true
    sample_images:
      selector:
        kind: xpath
        expr: //div[@class="cover"]/a/img/@data-src
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
