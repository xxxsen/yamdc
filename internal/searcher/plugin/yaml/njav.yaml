version: 1
name: njav
type: two-step
hosts:
  - https://njavtv.com
precheck:
  variables:
    clean_number: ${clean_number(${to_upper(${number})})}
request:
  method: GET
  path: /cn/search/${replace(${number}, "_", "-")}
  accept_status_codes: [200]
workflow:
  search_select:
    selectors:
      - name: read_link
        kind: xpath
        expr: //div[@class="my-2 text-sm text-nord4 truncate"]/a[@class="text-secondary group-hover:text-primary"]/@href
      - name: read_title
        kind: xpath
        expr: //div[@class="my-2 text-sm text-nord4 truncate"]/a[@class="text-secondary group-hover:text-primary"]/text()
    item_variables:
      clean_title: ${clean_number(${to_upper(${item.read_title})})}
    match:
      mode: and
      conditions:
        - contains("${item_variables.clean_title}", "${vars.clean_number}")
    return: ${item.read_link}
    next_request:
      method: GET
      url: ${build_url(${host}, ${value})}
      accept_status_codes: [200]
scrape:
  format: html
  fields:
    number:
      selector:
        kind: xpath
        expr: //div[@class="text-secondary" and contains(span[text()], "番号:")]/span[@class="font-medium"]/text()
      parser: string
      required: true
    title:
      selector:
        kind: xpath
        expr: //div[@class="text-secondary" and contains(span[text()], "标题:")]/span[@class="font-medium"]/text()
      parser: string
      required: true
    actors:
      selector:
        kind: xpath
        expr: //meta[@property="og:video:actor"]/@content
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    release_date:
      selector:
        kind: xpath
        expr: //div[@class="text-secondary" and contains(span[text()], "发行日期:")]/time[@class="font-medium"]/text()
      parser: date_only
    duration:
      selector:
        kind: xpath
        expr: //meta[@property="og:video:duration"]/@content
      parser: string
    studio:
      selector:
        kind: xpath
        expr: //div[@class="text-secondary" and contains(span[text()], "发行商:")]/a[@class="text-nord13 font-medium"]/text()
      parser: string
    label:
      selector:
        kind: xpath
        expr: //div[@class="text-secondary" and contains(span[text()], "标籤:")]/a[@class="text-nord13 font-medium"]/text()
      parser: string
    director:
      selector:
        kind: xpath
        expr: //div[@class="text-secondary" and contains(span[text()], "导演:")]/a[@class="text-nord13 font-medium"]/text()
      parser: string
    series:
      selector:
        kind: xpath
        expr: //div[@class="text-secondary" and contains(span[text()], "系列:")]/a[@class="text-nord13 font-medium"]/text()
      parser: string
    genres:
      selector:
        kind: xpath
        expr: //div[@class="text-secondary" and contains(span[text()], "类型:")]/a[@class="text-nord13 font-medium"]/text()
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    cover:
      selector:
        kind: xpath
        expr: //link[@rel="preload" and @as="image"]/@href
      parser: string
      required: true
