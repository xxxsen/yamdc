version: 1
name: javbus
type: one-step
hosts:
  - https://www.javbus.com
request:
  method: GET
  path: /${number}
  headers:
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
    Accept-Language: en-US,en;q=0.5
    Accept-Encoding: gzip, deflate, br, zstd
  cookies:
    existmag: mag
    age: verified
    dv: "1"
  accept_status_codes: [200]
  not_found_status_codes: [404]
scrape:
  format: html
  fields:
    number:
      selector:
        kind: xpath
        expr: //div[@class="row movie"]/div[@class="col-md-3 info"]/p[span[contains(text(),'識別碼:')]]/span[2]/text()
      parser: string
      required: true
    title:
      selector:
        kind: xpath
        expr: //div[@class="container"]/h3
      parser: string
      required: true
    actors:
      selector:
        kind: xpath
        expr: //div[@class="star-name"]/a/text()
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    release_date:
      selector:
        kind: xpath
        expr: //div[@class="row movie"]/div[@class="col-md-3 info"]/p[span[contains(text(),'發行日期:')]]/text()[1]
      parser: date_only
    duration:
      selector:
        kind: xpath
        expr: //div[@class="row movie"]/div[@class="col-md-3 info"]/p[span[contains(text(),'長度:')]]/text()[1]
      parser: duration_default
    studio:
      selector:
        kind: xpath
        expr: //div[@class="row movie"]/div[@class="col-md-3 info"]/p[span[contains(text(),'製作商:')]]/a/text()
      parser: string
    label:
      selector:
        kind: xpath
        expr: //div[@class="row movie"]/div[@class="col-md-3 info"]/p[span[contains(text(),'發行商:')]]/a/text()
      parser: string
    series:
      selector:
        kind: xpath
        expr: //div[@class="row movie"]/div[@class="col-md-3 info"]/p[span[contains(text(),'系列:')]]/a/text()
      parser: string
    genres:
      selector:
        kind: xpath
        expr: //div[@class="row movie"]/div[@class="col-md-3 info"]/p/span[@class="genre"]/label[input[@name="gr_sel"]]/a/text()
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    cover:
      selector:
        kind: xpath
        expr: //div[@class="row movie"]/div[@class="col-md-9 screencap"]/a[@class="bigImage"]/@href
      parser: string
      required: true
    sample_images:
      selector:
        kind: xpath
        expr: //div[@id="sample-waterfall"]/a[@class="sample-box"]/@href
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
postprocess:
  defaults:
    title_lang: ja
