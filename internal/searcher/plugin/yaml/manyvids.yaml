version: 1
name: manyvids
type: one-step
hosts:
  - https://www.manyvids.com
precheck:
  number_patterns:
    - ^MANYVIDS.*
request:
  method: GET
  url: https://api.manyvids.com/store/video/${trim_prefix(${number}, "MANYVIDS-")}
  headers:
    Accept: application/json
    Origin: https://www.manyvids.com
    Referer: https://www.manyvids.com/
    Sec-GPC: "1"
  accept_status_codes: [200]
scrape:
  format: json
  fields:
    title:
      selector:
        kind: jsonpath
        expr: $.data.title
      parser: string
      required: true
    plot:
      selector:
        kind: jsonpath
        expr: $.data.description
      parser: string
    actors:
      selector:
        kind: jsonpath
        expr: $.data.model.displayName
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    release_date:
      selector:
        kind: jsonpath
        expr: $.data.launchDate
      transforms:
        - kind: split_index
          sep: T
          index: 0
      parser:
        kind: date_layout_soft
        layout: "2006-01-02"
    duration:
      selector:
        kind: jsonpath
        expr: $.data.videoDuration
      parser: duration_mmss
    genres:
      selector:
        kind: jsonpath
        expr: $.data.tagList[*].label
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    cover:
      selector:
        kind: jsonpath
        expr: $.data.screenshot
      parser: string
      required: true
    poster:
      selector:
        kind: jsonpath
        expr: $.data.screenshot
      parser: string
postprocess:
  assign:
    number: ${number}
  defaults:
    title_lang: en
    plot_lang: en
