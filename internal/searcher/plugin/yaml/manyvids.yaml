version: 1
name: manyvids
type: one-step
hosts:
  - https://www.manyvids.com
precheck:
  number_patterns:
    - ^MANYVIDS.*
request:
  method: GET
  path: /Video/${trim_prefix(${number}, "MANYVIDS-")}
  accept_status_codes: [200]
  not_found_status_codes: [404]
scrape:
  format: html
  fields:
    title:
      selector:
        kind: xpath
        expr: //h1[starts-with(@class, 'VideoMetaInfo_title')]/text()
      transforms:
        - kind: trim_suffix
          value: "- ManyVids"
        - kind: trim
      parser: string
      required: true
    plot:
      selector:
        kind: xpath
        expr: //div[contains(@class, 'VideoDetail_description')]//p/text()
      parser: string
    actors:
      selector:
        kind: xpath
        expr: //div[starts-with(@class, 'VideoProfileCard_videoProfileCard')]//div[contains(@class, 'VideoProfileCard_creatorDetails')]//a[contains(@class, 'VideoProfileCard_link')]
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    release_date:
      selector:
        kind: xpath
        expr: //span[starts-with(@class, 'VideoDetail_date')]/text()
      parser:
        kind: date_layout_soft
        layout: "Jan 2, 2006"
    duration:
      selector:
        kind: xpath
        expr: //div[contains(@class, 'VideoDetail_details')]//span[5]/text()
      parser: duration_human
    genres:
      selector:
        kind: xpath
        expr: //div[starts-with(@class, 'TagList_tagList')]//a[starts-with(@class, 'Tag_mavTag')]
        multi: true
      transforms:
        - kind: replace
          old: "#"
          new: ""
        - kind: map_trim
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    cover:
      selector:
        kind: xpath
        expr: //meta[@property='og:image']/@content
      parser: string
      required: true
    poster:
      selector:
        kind: xpath
        expr: //meta[@property='og:image']/@content
      parser: string
postprocess:
  assign:
    number: ${number}
  defaults:
    title_lang: en
