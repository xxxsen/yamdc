version: 1
name: fc2ppvdb
type: one-step
hosts:
  - https://fc2ppvdb.com
precheck:
  number_patterns:
    - ^(?i)fc2[-_]?ppv[-_]?.+$
request:
  method: GET
  path: /articles/${trim_prefix(${trim_prefix(${to_upper(${replace(${number}, "_", "-")})}, "FC2-")}, "PPV-")}
  accept_status_codes: [200]
  not_found_status_codes: [404]
scrape:
  format: html
  fields:
    number:
      selector:
        kind: xpath
        expr: //div[contains(text(), "ID")]/span/text()
      parser: string
      required: true
    title:
      selector:
        kind: xpath
        expr: //div[@class="w-full lg:pl-8 px-2 lg:w-3/5"]/h2/a/text()
      parser: string
      required: true
    actors:
      selector:
        kind: xpath
        expr: //div[contains(text(), "女優")]/span/a/text()
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    release_date:
      selector:
        kind: xpath
        expr: //div[contains(text(), "販売日")]/span/text()
      parser: date_only
    duration:
      selector:
        kind: xpath
        expr: //div[contains(text(), "収録時間")]/span/text()
      parser: duration_hhmmss
    studio:
      selector:
        kind: xpath
        expr: //div[contains(text(), "販売者")]/span/a/text()
      parser: string
    director:
      selector:
        kind: xpath
        expr: //div[contains(text(), "販売者")]/span/a/text()
      parser: string
    genres:
      selector:
        kind: xpath
        expr: //div[contains(text(), "タグ")]/span/a/text()
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    cover:
      selector:
        kind: xpath
        expr: //div[@class="lg:w-2/5 w-full mb-12 md:mb-0"]/a/img/@src
      parser: string
      required: true
    poster:
      selector:
        kind: xpath
        expr: //div[@class="lg:w-2/5 w-full mb-12 md:mb-0"]/a/img/@src
      parser: string
postprocess:
  assign:
    number: ${number}
  defaults:
    title_lang: ja
