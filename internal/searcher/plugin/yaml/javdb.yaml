version: 1
name: javdb
type: two-step
hosts:
  - https://javdb.com
precheck:
  variables:
    clean_number: ${clean_number(${number})}
request:
  method: GET
  path: /search
  query:
    q: ${number}
    f: all
  accept_status_codes: [200]
workflow:
  search_select:
    selectors:
      - name: read_link
        kind: xpath
        expr: //div[@class="movie-list h cols-4 vcols-8"]/div[@class="item"]/a/@href
      - name: read_number
        kind: xpath
        expr: //div[@class="movie-list h cols-4 vcols-8"]/div[@class="item"]/a/div[@class="video-title"]/strong
    item_variables:
      clean_item_number: ${clean_number(${item.read_number})}
    match:
      mode: and
      conditions:
        - equals("${vars.clean_number}", "${item_variables.clean_item_number}")
    return: ${item.read_link}
    next_request:
      method: GET
      path: ${value}
      accept_status_codes: [200]
scrape:
  format: html
  fields:
    number:
      selector:
        kind: xpath
        expr: //a[@class="button is-white copy-to-clipboard"]/@data-clipboard-text
      parser: string
      required: true
    title:
      selector:
        kind: xpath
        expr: //h2[@class="title is-4"]/strong[@class="current-title"]
      parser: string
      required: true
    actors:
      selector:
        kind: xpath
        expr: //div[strong[contains(text(), "演員")]]/span[@class="value"]/a
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    release_date:
      selector:
        kind: xpath
        expr: //div[strong[contains(text(), "日期")]]/span[@class="value"]
      parser: date_only
    duration:
      selector:
        kind: xpath
        expr: //div[strong[contains(text(), "時長")]]/span[@class="value"]
      parser: duration_default
    studio:
      selector:
        kind: xpath
        expr: //div[strong[contains(text(), "片商")]]/span[@class="value"]
      parser: string
    series:
      selector:
        kind: xpath
        expr: //div[strong[contains(text(), "系列")]]/span[@class="value"]
      parser: string
    genres:
      selector:
        kind: xpath
        expr: //div[strong[contains(text(), "類別")]]/span[@class="value"]/a
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    cover:
      selector:
        kind: xpath
        expr: //div[@class="column column-video-cover"]/a/img/@src
      parser: string
      required: true
    sample_images:
      selector:
        kind: xpath
        expr: //div[@class="tile-images preview-images"]/a[@class="tile-item"]/@href
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
postprocess:
  defaults:
    title_lang: ja

