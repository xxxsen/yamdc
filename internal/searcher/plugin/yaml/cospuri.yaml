version: 1
name: cospuri
type: one-step
hosts:
  - https://www.cospuri.com
precheck:
  number_patterns:
    - ^(?i)COSPURI-[0-9]{4}[A-Za-z0-9]{4}$
request:
  method: GET
  path: /sample
  query:
    id: ${to_lower(${trim_prefix(${number}, "COSPURI-")})}
  accept_status_codes: [200]
  not_found_status_codes: [404]
scrape:
  format: html
  fields:
    title:
      selector:
        kind: xpath
        expr: //div[@class="sample-details"]//div[@class="description"]/text()
      parser: string
      required: true
    plot:
      selector:
        kind: xpath
        expr: //div[@class="sample-details"]//div[@class="description"]/text()
      parser: string
    actors:
      selector:
        kind: xpath
        expr: //div[@class="sample-details"]//div[@class="sample-model"]/a/text()
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    duration:
      selector:
        kind: xpath
        expr: //div[@class="sample-details"]//div[@class="detail-box"]/div[@class="length"]/strong/text()
      parser: duration_mm
    genres:
      selector:
        kind: xpath
        expr: //div[@class="sample-details"]//a[@class="tag"]/text()
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    cover:
      selector:
        kind: xpath
        expr: //div[@class="main wide"]/div/div[@class="player fp-slim fp-edgy fp-mute"]/@style
      transforms:
        - kind: regex_extract
          value: (?i)url\((.*)\s*\)
          index: 1
      parser: string
      required: true
    sample_images:
      selector:
        kind: xpath
        expr: //div[@class="sample-left"]/div[@class="thumb"]/a/@href
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
postprocess:
  defaults:
    title_lang: en
    plot_lang: en
    genres_lang: en
  switch_config:
    disable_release_date_check: true
