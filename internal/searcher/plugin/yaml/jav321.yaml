version: 1
name: jav321
type: one-step
hosts:
  - https://www.jav321.com
request:
  method: POST
  path: /search
  headers:
    Content-Type: application/x-www-form-urlencoded
  body:
    kind: form
    values:
      sn: ${number}
  accept_status_codes: [200]
  not_found_status_codes: [404]
scrape:
  format: html
  fields:
    number:
      selector:
        kind: xpath
        expr: //b[contains(text(),"品番")]/following-sibling::node()
      transforms:
        - kind: trim_charset
          cutset: ": \t"
      parser: string
      required: true
    title:
      selector:
        kind: xpath
        expr: /html/body/div[2]/div[1]/div[1]/div[1]/h3/text()
      transforms:
        - kind: trim
      parser: string
      required: true
    plot:
      selector:
        kind: xpath
        expr: /html/body/div[2]/div[1]/div[1]/div[2]/div[3]/div/text()
      parser: string
    actors:
      selector:
        kind: xpath
        expr: //b[contains(text(),"出演者")]/following-sibling::a[starts-with(@href,"/star")]/text()
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    release_date:
      selector:
        kind: xpath
        expr: //b[contains(text(),"配信開始日")]/following-sibling::node()
      transforms:
        - kind: trim_charset
          cutset: ": \t"
      parser: date_only
    duration:
      selector:
        kind: xpath
        expr: //b[contains(text(),"収録時間")]/following-sibling::node()
      transforms:
        - kind: trim_charset
          cutset: ": \t"
      parser: duration_default
    studio:
      selector:
        kind: xpath
        expr: //b[contains(text(),"メーカー")]/following-sibling::a[starts-with(@href,"/company")]/text()
      parser: string
    label:
      selector:
        kind: xpath
        expr: //b[contains(text(),"メーカー")]/following-sibling::a[starts-with(@href,"/company")]/text()
      parser: string
    series:
      selector:
        kind: xpath
        expr: //b[contains(text(),"シリーズ")]/following-sibling::node()
      transforms:
        - kind: trim_charset
          cutset: ": \t"
      parser: string
    genres:
      selector:
        kind: xpath
        expr: //b[contains(text(),"ジャンル")]/following-sibling::a[starts-with(@href,"/genre")]/text()
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    cover:
      selector:
        kind: xpath
        expr: /html/body/div[2]/div[2]/div[1]/p/a/img/@src
      parser: string
      required: true
    sample_images:
      selector:
        kind: xpath
        expr: //div[@class="col-md-3"]/div[@class="col-xs-12 col-md-12"]/p/a/img/@src
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
postprocess:
  defaults:
    title_lang: ja
    plot_lang: ja

