version: 1
name: madouqu
type: one-step
hosts:
  - https://madouqu.com
precheck:
  number_patterns:
    - ^MADOU.*
multi_request:
  unique: true
  candidates:
    - ${trim_prefix(${trim_prefix(${trim_prefix(${number}, "MADOU")}, "-")}, "_")}
    - ${replace(${trim_prefix(${trim_prefix(${trim_prefix(${number}, "MADOU")}, "-")}, "_")}, "-", "")}
    - ${replace(${trim_prefix(${trim_prefix(${trim_prefix(${number}, "MADOU")}, "-")}, "_")}, "_", "")}
  request:
    method: GET
    path: /video/${to_lower(${candidate})}/
    accept_status_codes: [200]
  success_when:
    mode: and
    conditions:
      - contains("${body}", "片名")
scrape:
  format: html
  fields:
    number:
      selector:
        kind: xpath
        expr: //p[contains(text(), "番號：")]/text()
      transforms:
        - kind: split_index
          sep: "："
          index: 1
        - kind: trim
        - kind: to_upper
      parser: string
    title:
      selector:
        kind: xpath
        expr: //p[contains(text(), "片名：")]/text()
      transforms:
        - kind: split_index
          sep: "："
          index: 1
        - kind: trim
      parser: string
      required: true
    actors:
      selector:
        kind: xpath
        expr: //p[a[@title="model"] and contains(., "麻豆女郎：")]
        multi: true
      transforms:
        - kind: replace
          old: 麻豆女郎：
          new: ""
        - kind: map_trim
        - kind: split
          sep: "、"
        - kind: map_trim
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    release_date:
      selector:
        kind: xpath
        expr: //meta[@property="article:published_time"]/@content
      transforms:
        - kind: split_index
          sep: "T"
          index: 0
      parser:
        kind: date_layout_soft
        layout: "2006-01-02"
    genres:
      selector:
        kind: xpath
        expr: //span[@class="meta-category"]/a[@rel="category"]
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    cover:
      selector:
        kind: xpath
        expr: //meta[@property="og:image"]/@content
      parser: string
      required: true
postprocess:
  assign:
    number: ${first_non_empty(${meta.number}, ${number})}
