version: 1
name: javhoo
type: one-step
hosts:
  - https://www.javhoo.com
request:
  method: GET
  path: /av/${number}
  accept_status_codes: [200]
  not_found_status_codes: [404]
scrape:
  format: html
  fields:
    number:
      selector:
        kind: xpath
        expr: //div[@class="project_info"]/p/span[@class="categories"]/text()
      parser: string
      required: true
    title:
      selector:
        kind: xpath
        expr: //header[@class="article-header"]/h1[@class="article-title"]/text()
      parser: string
      required: true
    actors:
      selector:
        kind: xpath
        expr: //p/span[@class="genre"]/a[contains(@href, "star")]/text()
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    release_date:
      selector:
        kind: xpath
        expr: //div[@class="project_info"]/p[span[contains(text(), "發行日期")]]/text()[2]
      parser: date_only
    duration:
      selector:
        kind: xpath
        expr: //div[@class="project_info"]/p[span[contains(text(), "長度")]]/text()[2]
      parser: duration_default
    studio:
      selector:
        kind: xpath
        expr: //div[@class="project_info"]/p[span[contains(text(), "製作商")]]/a/text()
      parser: string
    label:
      selector:
        kind: xpath
        expr: //div[@class="project_info"]/p[span[contains(text(), "發行商")]]/a/text()
      parser: string
    director:
      selector:
        kind: xpath
        expr: //div[@class="project_info"]/p[span[contains(text(), "導演")]]/a/text()
      parser: string
    series:
      selector:
        kind: xpath
        expr: //div[@class="project_info"]/p[span[contains(text(), "系列")]]/a/text()
      parser: string
    genres:
      selector:
        kind: xpath
        expr: //p/span[@class="genre"]/a[contains(@href, "genre")]/text()
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
    cover:
      selector:
        kind: xpath
        expr: //p/a[@class="dt-single-image"]/@href
      parser: string
      required: true
    sample_images:
      selector:
        kind: xpath
        expr: //div[@id="sample-box"]/div/a/@href
        multi: true
      transforms:
        - kind: remove_empty
        - kind: dedupe
      parser: string_list
postprocess:
  defaults:
    title_lang: ja
